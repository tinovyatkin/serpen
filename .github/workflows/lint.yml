on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

name: Code Quality Checks

# see https://doc.rust-lang.org/stable/clippy/continuous_integration/github_actions.html

# Make sure CI fails on all warnings, including Clippy lints
env:
  RUSTFLAGS: '-Dwarnings'
  CLICOLOR: 1

jobs:
  clippy_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Cargo registry
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache build artifacts
        uses: actions/cache@v4.2.3
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

      - run: rustup component add clippy
      - run: cargo clippy --workspace --all-targets --all-features --locked

      # Generate clippy JSON report for SonarQube
      - name: Generate Clippy report for SonarQube
        run: cargo clippy --workspace --all-targets --all-features --locked --message-format=json > target/clippy.json || true

      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

      - name: Spell Check Repo
        uses: crate-ci/typos@v1.33.1

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Install rust-code-analysis
      - name: Install rust-code-analysis
        env:
          RCA_LINK: https://github.com/mozilla/rust-code-analysis/releases/download
          RCA_VERSION: v0.0.25
        run: |
          mkdir -p $HOME/.local/bin
          curl -L "$RCA_LINK/$RCA_VERSION/rust-code-analysis-linux-cli-x86_64.tar.gz" |
          tar xz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Prepare output directory for rust-code-analysis
      - name: Prepare rust-code-analysis output dir
        run: mkdir -p $HOME/rca-json

      # Run rust-code-analysis on PR-diff files
      - name: Run rust-code-analysis on PR-diff
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          rust-code-analysis-cli --metrics -O json --pr -o "$HOME/rca-json" -p crates/cribo/src

      # Run rust-code-analysis on all files (push to main)
      - name: Run rust-code-analysis on all files
        if: ${{ github.event_name == 'push' }}
        run: |
          rust-code-analysis-cli --metrics -O json -o "$HOME/rca-json" -p crates/cribo/src

      - name: Upload rust-code-analysis json
        uses: actions/upload-artifact@v4
        with:
          name: rca-json-ubuntu
          path: ~/rca-json

      # Comment rust-code-analysis metrics on pull requests
      - name: Comment rust-code-analysis metrics on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const dir = `${process.env.HOME}/rca-json`;
            const { withFileTypes } = { withFileTypes: true };
            // Collect JSON files
            function collectFiles(d) {
              return fs.readdirSync(d, { withFileTypes: true }).flatMap(dirent => {
                const full = `${d}/${dirent.name}`;
                return dirent.isDirectory() ? collectFiles(full) : [full];
              });
            }
            const files = collectFiles(dir).filter(f => f.endsWith('.json'));
            let rows = [];
            files.forEach(fullPath => {
              const rel = fullPath.slice(dir.length + 1);
              const items = JSON.parse(fs.readFileSync(fullPath, 'utf8'));
              const count = items.length || 1;
              // Sum and average key metrics
              const totalCyclo = items.reduce((sum, o) => sum + o.metrics.cyclomatic.sum, 0);
              const totalCog  = items.reduce((sum, o) => sum + o.metrics.cognitive.sum, 0);
              const totalFunc = items.reduce((sum, o) => sum + o.metrics.nom.functions, 0);
              rows.push({ file: rel, funcs: totalFunc, cyclo: (totalCyclo/count).toFixed(1), cog: (totalCog/count).toFixed(1) });
            });
            // Build markdown table
            let body = '## Rust Code Analysis Summary\n\n';
            body += '| File | Functions | Avg Cyclomatic | Avg Cognitive |\n';
            body += '|---|---:|---:|---:|\n';
            rows.forEach(r => body += `| ${r.file} | ${r.funcs} | ${r.cyclo} | ${r.cog} |\n`);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Cargo Machete
        uses: bnjbvr/cargo-machete@v0.8.0
